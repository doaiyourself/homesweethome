services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: naverland
      POSTGRES_PASSWORD: naverland
      POSTGRES_DB: naverland
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naverland"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://naverland:naverland@postgres:5432/naverland
      FRONTEND_ORIGIN: http://localhost:3000
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
